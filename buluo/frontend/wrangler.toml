[build]
command = "cd frontend && npm run build"
output_dir = "frontend/.next/standalone"
functions = "frontend/.next/server/(pages|app)/**/*.js"

[build.environment]
NODE_VERSION = "20"
NEXT_TELEMETRY_DISABLED = "1"

# ──── Cloudflare Pages 环境变量 ────
# 如果你有后端 API，在此配置：
# API_BASE_URL = "https://your-backend.example.com"

# ──── 忽略 node_modules ────
# Cloudflare Pages 会自动忽略，无需额外配置
